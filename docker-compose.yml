version: '3.8'

services:

mysql:
  image: mysql:8
  environment:
    MYSQL_ROOT_PASSWORD: password
    MYSQL_DATABASE: pos
  ports:
    - "3306:3306"


  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"